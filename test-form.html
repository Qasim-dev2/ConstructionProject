<!DOCTYPE html>
<html>
<head>
    <title>Contact Form Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            background: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Contact Form Test</h1>
    <p>This will test EmailJS configuration</p>
    
    <form id="contactForm">
        <div class="form-group">
            <label>Name:</label>
            <input type="text" id="name" required>
        </div>
        
        <div class="form-group">
            <label>Email:</label>
            <input type="email" id="email" required>
        </div>
        
        <div class="form-group">
            <label>Phone:</label>
            <input type="tel" id="phone">
        </div>
        
        <div class="form-group">
            <label>Message:</label>
            <textarea id="message" rows="5" required></textarea>
        </div>
        
        <button type="submit">Send Test Message</button>
    </form>
    
    <div id="status"></div>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
        // Initialize EmailJS
        emailjs.init('f9ErDzMnEKAjRsejA');
        
        document.getElementById('contactForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = 'Sending...';
            statusDiv.className = 'status';
            
            try {
                const result = await emailjs.send(
                    'service_432qedq',      // Service ID
                    'template_0tgepae',     // Template ID
                    {
                        from_name: document.getElementById('name').value,
                        from_email: document.getElementById('email').value,
                        from_phone: document.getElementById('phone').value || 'Not provided',
                        message: document.getElementById('message').value
                    }
                );
                
                console.log('Success:', result);
                statusDiv.innerHTML = '✓ Message sent successfully!';
                statusDiv.className = 'status success';
                
                // Clear form
                document.getElementById('contactForm').reset();
                
            } catch (error) {
                console.error('Error:', error);
                statusDiv.innerHTML = '✗ Error: ' + (error.text || error.message || 'Failed to send');
                statusDiv.className = 'status error';
            }
        });
    </script>
</body>
</html>
